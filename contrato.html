<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Contrato - Encanto Kids Infláveis</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0d6efd;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
color:#666;
margin-bottom:30px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

h2{
margin-top:30px;
margin-bottom:15px;
color:#ff7b00;
}

.brinquedos{
display:grid;
gap:10px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#f8f8f8;
border-radius:8px;
}

.item label{
margin:0;
font-weight:bold;
}

.total{
margin-top:20px;
padding:15px;
background:#0d6efd;
color:white;
font-size:22px;
font-weight:bold;
text-align:center;
border-radius:10px;
}

.assinatura-box{
margin-top:20px;
border:2px dashed #999;
border-radius:10px;
padding:10px;
text-align:center;
}

#assinatura{
border:1px solid #ccc;
border-radius:10px;
width:100%;
height:250px;
touch-action:none;
background:white;
}

.botoes{
margin-top:25px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.btn{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn-limpar{
background:#ffc107;
}

.btn-gerar{
background:#198754;
color:white;
}

.btn-voltar{
background:#dc3545;
color:white;
}

.empresa{
margin-top:30px;
padding:20px;
background:#f8f8f8;
border-radius:10px;
text-align:center;
}

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<script>

if(localStorage.getItem('adminLogado') !== 'true'){
window.location.href='admin.html';
}

</script>

<div class="container">

<h1>📄 Gerador de Contrato</h1>

<div class="subtitulo">
Encanto Kids Infláveis
</div>

<h2>Dados do Cliente</h2>

<div class="form-group">
<label>Nome Completo</label>
<input type="text" id="nome">
</div>

<div class="form-group">
<label>CPF</label>
<input type="text" id="cpf">
</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" id="telefone">
</div>

<div class="form-group">
<label>Endereço</label>
<input type="text" id="endereco">
</div>

<div class="form-group">
<label>Cidade</label>
<input type="text" id="cidade">
</div>

<div class="form-group">
<label>Data do Evento</label>
<input type="date" id="dataEvento">
</div>

<h2>Brinquedos</h2>

<div class="brinquedos">

<div class="item">
<label>
<input type="checkbox"
value="149.99"
onchange="calcularTotal()">
🎈 Pula-Pula Premium
</label>

<span>R$ 149,99</span>
</div>

<div class="item">
<label>
<input type="checkbox"
value="149.99"
onchange="calcularTotal()">
🛝 Tobogã Inflável Premium
</label>

<span>R$ 149,99</span>
</div>

<div class="item">
<label>
<input type="checkbox"
value="149.99"
onchange="calcularTotal()">
🏰 Castelo com Piscina de Bolinhas Premium
</label>

<span>R$ 149,99</span>
</div>

</div>

<div class="total">
Total: R$ <span id="valorTotal">0,00</span>
</div>

<h2>Assinatura do Cliente</h2>

<div class="assinatura-box">

<canvas id="assinatura"></canvas>

</div>
<div class="botoes">

<button class="btn btn-limpar"
onclick="limparAssinatura()">
🧹 Limpar Assinatura
</button>

<button class="btn btn-gerar"
onclick="gerarContrato()">
📄 Gerar Contrato
</button>

<button class="btn btn-voltar"
onclick="window.location.href='painel.html'">
⬅️ Voltar ao Painel
</button>

</div>

<div class="empresa">

<h3>Encanto Kids Infláveis</h3>

<p>Responsável: Vinicius Gabriel de Souza</p>

</div>

</div>

<script>

function calcularTotal(){

let total = 0;

document
.querySelectorAll('input[type="checkbox"]')
.forEach(item => {

if(item.checked){
total += parseFloat(item.value);
}

});

document.getElementById('valorTotal').innerText =
total.toFixed(2).replace('.',',');

}

const canvas =
document.getElementById('assinatura');

const ctx =
canvas.getContext('2d');

canvas.width =
canvas.offsetWidth;

canvas.height =
250;

let desenhando = false;

canvas.addEventListener('mousedown', iniciar);
canvas.addEventListener('mousemove', desenhar);
canvas.addEventListener('mouseup', parar);

canvas.addEventListener('touchstart', iniciarTouch);
canvas.addEventListener('touchmove', desenharTouch);
canvas.addEventListener('touchend', parar);

function iniciar(e){

desenhando = true;

ctx.beginPath();

ctx.moveTo(
e.offsetX,
e.offsetY
);

}

function desenhar(e){

if(!desenhando) return;

ctx.lineWidth = 2;

ctx.lineCap = 'round';

ctx.lineTo(
e.offsetX,
e.offsetY
);

ctx.stroke();

}

function parar(){

desenhando = false;

}

function iniciarTouch(e){

e.preventDefault();

const rect =
canvas.getBoundingClientRect();

const touch =
e.touches[0];

desenhando = true;

ctx.beginPath();

ctx.moveTo(
touch.clientX - rect.left,
touch.clientY - rect.top
);

}

function desenharTouch(e){

e.preventDefault();

if(!desenhando) return;

const rect =
canvas.getBoundingClientRect();

const touch =
e.touches[0];

ctx.lineWidth = 2;

ctx.lineCap = 'round';

ctx.lineTo(
touch.clientX - rect.left,
touch.clientY - rect.top
);

ctx.stroke();

}

function limparAssinatura(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

async function gerarContrato(){

const nome = document.getElementById('nome').value;
const cpf = document.getElementById('cpf').value;
const telefone = document.getElementById('telefone').value;
const endereco = document.getElementById('endereco').value;
const cidade = document.getElementById('cidade').value;
const dataEvento = document.getElementById('dataEvento').value;

if(nome.trim() === ''){
    alert('Preencha o nome do cliente.');
    return;
}

let brinquedos = [];

document
.querySelectorAll('input[type="checkbox"]')
.forEach(item => {

    if(item.checked){

        const texto =
        item.parentElement.innerText.trim();

        brinquedos.push(texto);

    }

});

const total =
document.getElementById('valorTotal').innerText;

const { jsPDF } = window.jspdf;

const pdf = new jsPDF();

pdf.setFontSize(18);
pdf.text('CONTRATO DE LOCAÇÃO', 20, 20);

pdf.setFontSize(12);

pdf.text('Encanto Kids Infláveis',20,35);

pdf.text(`Cliente: ${nome}`,20,50);
pdf.text(`CPF: ${cpf}`,20,60);
pdf.text(`Telefone: ${telefone}`,20,70);
pdf.text(`Endereço: ${endereco}`,20,80);
pdf.text(`Cidade: ${cidade}`,20,90);
pdf.text(`Data do Evento: ${dataEvento}`,20,100);

pdf.text('Brinquedos Locados:',20,120);

let linha = 130;

brinquedos.forEach(item => {

    pdf.text('- ' + item,25,linha);

    linha += 10;

});

pdf.text(`Valor Total: R$ ${total}`,20,linha + 10);

pdf.text(
'Responsável: Vinicius Gabriel de Souza',
20,
linha + 35
);

pdf.text(
'Encanto Kids Infláveis',
20,
linha + 45
);

pdf.save(
`Contrato-${nome}.pdf`
);

}

const nome =
document.getElementById('nome').value;

if(nome.trim() === ''){

alert(
'Preencha o nome do cliente.'
);

return;

}

alert(
'✅ Contrato gerado com sucesso!\n\nPróxima versão: PDF e WhatsApp.'
);

}

</script>

</body>
</html>
