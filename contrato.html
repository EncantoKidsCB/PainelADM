<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Contratos - Encanto Kids Infláveis</title>

<link rel="icon" href="favicon.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f1115;
color:white;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
background:#171a21;
padding:40px;
border-radius:20px;
border:1px solid #252932;
box-shadow:0 0 30px rgba(0,0,0,.5);
}

.topo{
text-align:center;
margin-bottom:40px;
}

.topo h1{
font-size:42px;
color:white;
margin-bottom:10px;
}

.topo p{
color:#9ca3af;
font-size:18px;
}

.secao{
margin-bottom:35px;
}

.secao h2{
color:#0d6efd;
margin-bottom:20px;
font-size:28px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
textarea,
select{
width:100%;
padding:14px;
background:#0f1115;
color:white;
border:1px solid #2a2f3a;
border-radius:10px;
font-size:15px;
}

input:focus,
textarea:focus{
outline:none;
border-color:#0d6efd;
}

textarea{
resize:none;
height:120px;
}

.brinquedo{
background:#0f1115;
border:1px solid #2a2f3a;
padding:18px;
border-radius:12px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brinquedo:hover{
border-color:#0d6efd;
}

.total-box{
margin-top:20px;
background:#0f1115;
padding:20px;
border-radius:12px;
border:1px solid #2a2f3a;
}

.total-box h3{
font-size:28px;
color:#00d26a;
}

canvas{
width:100%;
max-width:700px;
background:white;
border-radius:10px;
margin-top:10px;
}

.botoes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:30px;
}

.btn{
padding:16px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-pdf{
background:#0d6efd;
color:white;
}

.btn-whats{
background:#25D366;
color:white;
}

.btn-limpar{
background:#dc3545;
color:white;
}

</style>

</head>

<script>

let total = 0;

function calcularTotal(){

total = 0;

document.querySelectorAll(".item").forEach(item=>{

if(item.checked){
total += parseFloat(item.value);
}

});

document.getElementById("total").innerHTML =
"R$ " + total.toFixed(2).replace(".",",");

}

/* ASSINATURA */

const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");

let desenhando = false;

canvas.addEventListener("mousedown", iniciar);
canvas.addEventListener("mouseup", parar);
canvas.addEventListener("mousemove", desenhar);

canvas.addEventListener("touchstart", iniciarTouch);
canvas.addEventListener("touchend", parar);
canvas.addEventListener("touchmove", desenharTouch);

function iniciar(){
desenhando = true;
}

function parar(){
desenhando = false;
ctx.beginPath();
}

function desenhar(e){

if(!desenhando) return;

ctx.lineWidth = 2;
ctx.lineCap = "round";
ctx.strokeStyle = "#000";

ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);

}

function iniciarTouch(e){
desenhando = true;
}

function desenharTouch(e){

if(!desenhando) return;

const rect = canvas.getBoundingClientRect();

const x = e.touches[0].clientX - rect.left;
const y = e.touches[0].clientY - rect.top;

ctx.lineWidth = 2;
ctx.lineCap = "round";
ctx.strokeStyle = "#000";

ctx.lineTo(x,y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y);

e.preventDefault();

}

function limparAssinatura(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}

/* PDF */

async function gerarPDF(){

const { jsPDF } = window.jspdf;

const pdf = new jsPDF();

const nome =
document.getElementById("nome").value;

const cpf =
document.getElementById("cpf").value;

const telefone =
document.getElementById("telefone").value;

const endereco =
document.getElementById("endereco").value;

const cidade =
document.getElementById("cidade").value;

const dataEvento =
document.getElementById("dataEvento").value;

const observacoes =
document.getElementById("observacoes").value;

pdf.setFontSize(18);

pdf.text(
"CONTRATO DE LOCAÇÃO",
20,
20
);

pdf.setFontSize(12);

pdf.text(
"Encanto Kids Infláveis",
20,
35
);

pdf.text(
"Cliente: " + nome,
20,
55
);

pdf.text(
"CPF: " + cpf,
20,
65
);

pdf.text(
"Telefone: " + telefone,
20,
75
);

pdf.text(
"Endereço: " + endereco,
20,
85
);

pdf.text(
"Cidade: " + cidade,
20,
95
);

pdf.text(
"Data do Evento: " + dataEvento,
20,
105
);

pdf.text(
"Valor Total: R$ " +
total.toFixed(2),
20,
115
);

pdf.text(
"Observações:",
20,
130
);

pdf.text(
observacoes || "-",
20,
140
);

const assinaturaImagem =
canvas.toDataURL();

pdf.addImage(
assinaturaImagem,
"PNG",
20,
170,
80,
30
);

pdf.text(
"Assinatura do Cliente",
20,
205
);

pdf.save(
"Contrato_EncantoKids.pdf"
);

}

/* WHATSAPP */

function enviarWhatsApp(){

const nome =
document.getElementById("nome").value;

const telefone =
document.getElementById("telefone").value;

const mensagem =
`Olá ${nome},

Segue seu contrato da Encanto Kids Infláveis.

Valor Total: R$ ${total.toFixed(2)}

Obrigado pela preferência!`;

window.open(

`https://wa.me/55${telefone.replace(/\D/g,'')}?text=${encodeURIComponent(mensagem)}`,

"_blank"

);

}

</script>

</body>
</html>
    
<body>

<div class="container">

<div class="topo">

<h1>📄 Gerador de Contratos</h1>

<p>
Encanto Kids Infláveis • Sistema Administrativo
</p>

</div>

<div class="secao">

<h2>Dados do Cliente</h2>

<div class="form-group">
<label>Nome Completo</label>
<input type="text" id="nome">
</div>

<div class="form-group">
<label>CPF</label>
<input type="text" id="cpf">
</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" id="telefone">
</div>

<div class="form-group">
<label>Endereço</label>
<input type="text" id="endereco">
</div>

<div class="form-group">
<label>Cidade</label>
<input type="text" id="cidade">
</div>

<div class="form-group">
<label>Data do Evento</label>
<input type="date" id="dataEvento">
</div>

</div>
<div class="secao">

<h2>Brinquedos</h2>

<div class="brinquedo">

<div>
<h3>🎈 Pula-Pula Premium</h3>
<p>R$ 149,99</p>
</div>

<input
type="checkbox"
value="149.99"
class="item"
onchange="calcularTotal()">

</div>

<div class="brinquedo">

<div>
<h3>🏰 Castelo Inflável</h3>
<p>R$ 149,99</p>
</div>

<input
type="checkbox"
value="149.99"
class="item"
onchange="calcularTotal()">

</div>

<div class="brinquedo">

<div>
<h3>🛝 Tobogã Inflável</h3>
<p>R$ 149,99</p>
</div>

<input
type="checkbox"
value="149.99"
class="item"
onchange="calcularTotal()">

</div>

<div class="total-box">

<p>Total da Reserva</p>

<h3 id="total">
R$ 0,00
</h3>

</div>

</div>

<div class="secao">

<h2>Observações</h2>

<textarea
id="observacoes"
placeholder="Digite observações adicionais do contrato..."></textarea>

</div>

<div class="secao">

<h2>Assinatura do Cliente</h2>

<p style="color:#9ca3af;margin-bottom:10px;">
Assine dentro da área abaixo:
</p>

<canvas
id="assinatura"
width="700"
height="220">
</canvas>

<br><br>

<button
type="button"
class="btn btn-limpar"
onclick="limparAssinatura()">
🧹 Limpar Assinatura
</button>

</div>

<div class="botoes">

<button
class="btn btn-pdf"
onclick="gerarPDF()">

📄 Gerar PDF

</button>

<button
class="btn btn-whats"
onclick="enviarWhatsApp()">

📲 Enviar WhatsApp

</button>

</div>

</div>
