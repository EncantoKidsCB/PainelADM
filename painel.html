<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo - Encanto Kids Infláveis</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:#0d6efd;
}

.usuario{
font-weight:bold;
color:#555;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.titulo{
text-align:center;
margin-bottom:40px;
}

.titulo h1{
color:#0d6efd;
margin-bottom:10px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
transition:.3s;
cursor:pointer;
text-decoration:none;
color:#333;
}

.card:hover{
transform:translateY(-5px);
}

.icone{
font-size:50px;
margin-bottom:15px;
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#666;
}

.sair{
margin-top:40px;
text-align:center;
}

.btn-sair{
background:#dc3545;
color:white;
padding:15px 30px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-sair:hover{
opacity:.9;
}

</style>
</head>
<body>

<script>

if(localStorage.getItem('adminLogado') !== 'true'){
window.location.href='admin.html';
}

function logout(){

localStorage.removeItem('adminLogado');

window.location.href='admin.html';

}

</script>

<header>

<div class="logo">
🎈 Encanto Kids Infláveis
</div>

<div class="usuario">
👤 vinnysouza
</div>

</header>

<div class="container">

<div class="titulo">
<h1>Painel Administrativo</h1>
<p>Gerencie contratos e reservas da Encanto Kids Infláveis.</p>
</div>

<div class="cards">

<a href="contrato.html" class="card">
<div class="icone">📄</div>
<h3>Gerar Contrato</h3>
<p>Criar novo contrato para clientes.</p>
</a>

<div class="card">
<div class="icone">👥</div>
<h3>Clientes</h3>
<p>Em desenvolvimento.</p>
</div>

<div class="card">
<div class="icone">📋</div>
<h3>Contratos Salvos</h3>
<p>Em desenvolvimento.</p>
</div>

<div class="card">
<div class="icone">⚙️</div>
<h3>Configurações</h3>
<p>Em desenvolvimento.</p>
</div>

</div>

<div class="sair">

<button class="btn-sair" onclick="logout()">
🚪 Sair
</button>

</div>

</div>

</body>
</html>
