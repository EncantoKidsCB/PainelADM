<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encanto Kids Infláveis - Login</title>

<link rel="icon" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f1115,
#171a21,
#0f1115
);
overflow:hidden;
}

.login-box{
width:450px;
padding:50px;
background:rgba(23,26,33,.98);
border:1px solid #2a2f3a;
border-radius:25px;
box-shadow:
0 20px 60px rgba(0,0,0,.6);
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
color:#ffffff;
font-size:36px;
font-weight:700;
margin-bottom:10px;
}

.logo p{
color:#cfd4dc;
font-size:16px;
}

label{
display:block;
margin-bottom:10px;
color:white;
font-weight:600;
font-size:16px;
}

input{
width:100%;
padding:15px;
margin-bottom:20px;
background:#0f1115;
border:1px solid #2f3642;
border-radius:12px;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 10px rgba(13,110,253,.4);
}

button{
width:100%;
padding:16px;
background:#0d6efd;
border:none;
border-radius:12px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
background:#0b5ed7;
}

.erro{
margin-top:15px;
text-align:center;
color:#ff4d4d;
font-weight:bold;
display:none;
}

.rodape{
margin-top:30px;
text-align:center;
font-size:13px;
color:#7b8494;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<h1>🎈 Encanto Kids Infláveis</h1>

<p>Painel Administrativo</p>

</div>

<label>Usuário</label>
<input
type="text"
id="usuario"
placeholder="Digite seu usuário">

<label>Senha</label>
<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="login()">

Entrar

</button>

<div class="erro" id="erro">

Usuário ou senha incorretos.

</div>

<div class="rodape">

Sistema Administrativo © 2026

</div>

</div>

<script>

function login(){

const usuario =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

if(
usuario === "vinnysouza" &&
senha === "admin1"
){

localStorage.setItem(
"logado",
"sim"
);

window.location.href =
"painel.html";

}else{

document.getElementById("erro")
.style.display = "block";

}

}

</script>

</body>
</html>
