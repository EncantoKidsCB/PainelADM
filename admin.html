<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encanto Kids Infláveis - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0a0f1f,#111827,#0a0f1f);
}

.login-box{
width:500px;
padding:50px;
background:rgba(15,23,42,0.95);
border:1px solid rgba(255,255,255,0.1);
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo h1{
color:#ffffff !important;
font-size:42px;
font-weight:800;
margin-bottom:10px;
}

.logo p{
color:#ffffff !important;
font-size:20px;
font-weight:400;
}

label{
display:block;
color:#ffffff;
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

input{
width:100%;
padding:16px;
background:#020617;
border:1px solid #2563eb;
border-radius:15px;
color:white;
font-size:16px;
margin-bottom:25px;
}

input:focus{
outline:none;
box-shadow:0 0 15px rgba(37,99,235,.5);
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#2563eb;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.erro{
margin-top:15px;
text-align:center;
color:#ff4d4d;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">
<h1>🎈 Encanto Kids Infláveis</h1>
<p>Painel Administrativo</p>
</div>

<label>Usuário</label>
<input
type="text"
id="usuario"
placeholder="Digite seu usuário">

<label>Senha</label>
<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="login()">
Entrar
</button>

<div id="erro" class="erro">
Usuário ou senha incorretos.
</div>

</div>

<script>

function login(){

let usuario =
document.getElementById("usuario").value;

let senha =
document.getElementById("senha").value;

if(
usuario === "vinnysouza" &&
senha === "admin1"
){

localStorage.setItem(
"logado",
"sim"
);

window.location.href =
"painel.html";

}else{

document.getElementById("erro")
.style.display="block";

}

}

</script>

</body>
</html>
