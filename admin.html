<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login ADM - Encanto Kids Infláveis</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(
135deg,
#0f1115,
#171a21,
#0f1115
);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
}

.login-box{
width:450px;
padding:50px;
background:rgba(23,26,33,.95);
backdrop-filter:blur(15px);
border:1px solid #2a2f3a;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.logo{
text-align:center;
margin-bottom:35px;
}

.logo h1{
color:white;
font-size:38px;
}

.logo p{
color:#9ca3af;
margin-top:8px;
}

label{
display:block;
margin-bottom:8px;
color:white;
font-weight:600;
}

input{
width:100%;
padding:15px;
background:#0f1115;
border:1px solid #2a2f3a;
border-radius:12px;
color:white;
margin-bottom:20px;
}

input:focus{
outline:none;
border-color:#0d6efd;
}

button{
width:100%;
padding:16px;
background:#0d6efd;
border:none;
border-radius:12px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<div class="login-box">

<div class="logo">
🎈 Encanto Kids Infláveis
</div>

<div class="subtitulo">
Painel Administrativo
</div>

<div class="form-group">
<label>Usuário</label>
<input type="text" id="usuario">
</div>

<div class="form-group">
<label>Senha</label>
<input type="password" id="senha">
</div>

<button onclick="login()">
Entrar
</button>

<div id="erro" class="erro">
Usuário ou senha incorretos.
</div>

</div>

<script>

function login(){

const usuario =
document.getElementById('usuario').value;

const senha =
document.getElementById('senha').value;

if(
usuario === 'vinnysouza' &&
senha === 'admin1'
){

localStorage.setItem(
'adminLogado',
'true'
);

window.location.href =
'painel.html';

}else{

document.getElementById('erro')
.style.display='block';

}

}

</script>

</body>
</html>
